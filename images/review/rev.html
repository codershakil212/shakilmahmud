<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Review Section</title>
<style>
    body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

/* Section */
.testimonial-section {
  text-align: center;
  padding: 60px 20px;
  background: #fff;
}

.slider {
  overflow: hidden;
  max-width: 900px;
  margin: auto;
}

.slides {
  display: flex;
  transition: 0.5s;
}

/* Card */
.review-card {
  min-width: 300px;
  margin: 20px;
  padding: 20px;
  background: #fafafa;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.review-card img {
  border-radius: 50%;
}

.stars {
  color: gold;
  font-size: 18px;
}

/* Buttons */
.buttons button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  background: #007bff;
  color: #fff;
  cursor: pointer;
}

/* Form */
.review-form {
  text-align: center;
  padding: 40px;
}

.review-form input,
.review-form textarea,
.review-form select {
  width: 300px;
  margin: 10px;
  padding: 10px;
}

</style>
</head>
<body>

<section class="testimonial-section">

  <h2>What Our Clients Say</h2>

  <!-- Slider -->
  <div class="slider">

    <div class="slides" id="slides">

      <!-- Review Card -->
      <div class="review-card">
        <img src="https://i.pravatar.cc/80?img=1">
        <p>"Amazing service! Highly recommended."</p>
        <h4>John Doe</h4>
        <div class="stars">★★★★★</div>
      </div>

      <div class="review-card">
        <img src="https://i.pravatar.cc/80?img=2">
        <p>"Professional and fast delivery."</p>
        <h4>Sarah Khan</h4>
        <div class="stars">★★★★★</div>
      </div>

    </div>

  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button onclick="prevSlide()">Prev</button>
    <button onclick="nextSlide()">Next</button>
  </div>

</section>


<!-- Review Form -->
<section class="review-form">

  <h3>Submit Your Review</h3>

  <input type="text" id="name" placeholder="Your Name">
  <textarea id="review" placeholder="Write your review"></textarea>

  <select id="rating">
    <option value="★★★★★">5 Star</option>
    <option value="★★★★">4 Star</option>
    <option value="★★★">3 Star</option>
  </select>

  <button onclick="addReview()">Post Review</button>

</section>

<script>
    let index = 0;
const slides = document.getElementById("slides");

function showSlide() {
  slides.style.transform = `translateX(-${index * 340}px)`;
}

function nextSlide() {
  if (index < slides.children.length - 1) {
    index++;
  } else {
    index = 0;
  }
  showSlide();
}

function prevSlide() {
  if (index > 0) {
    index--;
  } else {
    index = slides.children.length - 1;
  }
  showSlide();
}

/* Auto Slide */
setInterval(nextSlide, 3000);


/* Add Review */
function addReview() {

  const name = document.getElementById("name").value;
  const review = document.getElementById("review").value;
  const rating = document.getElementById("rating").value;

  if(name === "" || review === "") {
    alert("Please fill all fields");
    return;
  }

  const card = document.createElement("div");
  card.className = "review-card";

  card.innerHTML = `
    <img src="https://i.pravatar.cc/80">
    <p>"${review}"</p>
    <h4>${name}</h4>
    <div class="stars">${rating}</div>
  `;

  slides.appendChild(card);

  document.getElementById("name").value = "";
  document.getElementById("review").value = "";
}

</script>
</body>
</html>
